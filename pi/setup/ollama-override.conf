# Target path on the Pi: /etc/systemd/system/ollama.service.d/override.conf
#
# Tuning rationale (Pi 5, 4 GB RAM, microSD):
#   - MAX_LOADED_MODELS=1: qwen2:0.5b (~352 MB) + nemotron-mini:4b (~2.7 GB) cannot coexist
#     under the OS + Ollama runtime in 4 GB. Forcing 1 means every cross-model call swaps.
#   - KEEP_ALIVE=30s: drop the model from memory 30 s after the last token so the next
#     request's cold-load is deterministic instead of being killed by the OOM reaper.
#   - NUM_PARALLEL=1: one in-flight request per model. Concurrency would double KV-cache.
#   - MAX_QUEUE=8: cap the request queue. Anything past 8 fails fast instead of piling up
#     in RAM during a swap.
#   - FLASH_ATTENTION=1, KV_CACHE_TYPE=q8_0: cuts KV memory roughly in half on CPU paths,
#     which is the difference between fitting nemotron-mini's working set and OOM.
#   - NUM_THREADS=4: Pi 5 has 4 cores. Leaving it auto sometimes spawns 8 software threads
#     and hurts throughput.
#   - NOHISTORY=1: skip writing chat history to ~/.ollama/history. Saves microSD writes.
#   - NICE_LEVEL: keep Ollama from starving systemd-journald or sshd during long generations.

[Service]
Environment="OLLAMA_MAX_LOADED_MODELS=1"
Environment="OLLAMA_KEEP_ALIVE=30s"
Environment="OLLAMA_NUM_PARALLEL=1"
Environment="OLLAMA_MAX_QUEUE=8"
Environment="OLLAMA_FLASH_ATTENTION=1"
Environment="OLLAMA_KV_CACHE_TYPE=q8_0"
Environment="OLLAMA_NUM_THREADS=4"
Environment="OLLAMA_NOHISTORY=1"
Environment="OLLAMA_HOST=127.0.0.1:11434"
Environment="OLLAMA_MODELS=/home/pi/.ollama/models"

# Resource caps so a runaway generation cannot drag the whole Pi under.
MemoryHigh=3200M
MemoryMax=3500M
CPUQuota=380%
Nice=5
TasksMax=512

# Restart hygiene: if the OOM killer takes Ollama, come back fast but rate-limited.
Restart=on-failure
RestartSec=5s
StartLimitIntervalSec=120
StartLimitBurst=5
